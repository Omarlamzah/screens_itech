workflows:
  # ---------------------------------------------------------------------------
  # 1) UNSIGNED iOS BUILD — works right now, no Apple Developer account needed.
  #    Use this to confirm the project compiles on macOS/Xcode.
  #    The resulting .app CANNOT be installed on a real device (it's unsigned),
  #    but a green build proves your iOS setup is correct.
  # ---------------------------------------------------------------------------
  ios-unsigned:
    name: iOS Unsigned Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter packages get
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build iOS (no code signing)
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - flutter_drive.log

  # ---------------------------------------------------------------------------
  # 1b) SIMULATOR BUILD — for running the app in a browser with Appetize.io
  #     (no iPhone / no Mac needed). Produces a Simulator .app, zipped.
  #     Download "Runner_simulator.zip" from artifacts, then upload it at
  #     https://appetize.io/upload to run the app live in your browser.
  # ---------------------------------------------------------------------------
  ios-simulator:
    name: iOS Simulator Build (for Appetize.io)
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter packages get
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build for iOS Simulator
        script: |
          flutter build ios --simulator --debug
      - name: Zip the Simulator .app
        script: |
          cd build/ios/iphonesimulator
          zip -r -y "$CM_BUILD_DIR/Runner_simulator.zip" Runner.app
    artifacts:
      - Runner_simulator.zip

  # ---------------------------------------------------------------------------
  # 2) SIGNED App Store build — produces a real .ipa and uploads to TestFlight.
  #    Requires:
  #      - A Codemagic App Store Connect integration named "codemagic"
  #        (key R8CTZW8NMJ + Issuer ID 24e51026-...-d7791751dfd5).
  #      - A secure env var CERTIFICATE_PRIVATE_KEY in group "appstore_credentials"
  #        (contents of "my files/cert_key.pem"). Codemagic uses it to create the
  #        signing certificate + provisioning profile automatically (--create).
  # ---------------------------------------------------------------------------
  ios-appstore:
    name: iOS App Store Build
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: codemagic
    environment:
      groups:
        - appstore_credentials   # must contain CERTIFICATE_PRIVATE_KEY
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        APP_STORE_APP_ID: 6780065615
        BUNDLE_ID: "com.itechevent.lesThemeApp"
    scripts:
      - name: Set up code signing (create cert + profile)
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key=@env:CERTIFICATE_PRIVATE_KEY \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Flutter packages get
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: find . -name "Podfile" -execdir pod install \;
      - name: Build signed IPA
        script: |
          LATEST_BUILD=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0)
          flutter build ipa --release \
            --build-number=$(($LATEST_BUILD + 1)) \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
