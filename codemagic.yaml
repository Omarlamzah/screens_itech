workflows:
  # ---------------------------------------------------------------------------
  # 1) UNSIGNED iOS BUILD — works right now, no Apple Developer account needed.
  #    Use this to confirm the project compiles on macOS/Xcode.
  #    The resulting .app CANNOT be installed on a real device (it's unsigned),
  #    but a green build proves your iOS setup is correct.
  # ---------------------------------------------------------------------------
  ios-unsigned:
    name: iOS Unsigned Build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter packages get
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter build iOS (no code signing)
        script: |
          flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphoneos/*.app
      - flutter_drive.log

  # ---------------------------------------------------------------------------
  # 2) SIGNED App Store build — ENABLE LATER once you have:
  #      - An Apple Developer account ($99/yr)
  #      - An App Store Connect API key uploaded to Codemagic
  #      - An integration named "codemagic" (Teams > Integrations > Developer Portal)
  #    Then uncomment this workflow and fill in your values.
  # ---------------------------------------------------------------------------
  # ios-appstore:
  #   name: iOS App Store Build
  #   instance_type: mac_mini_m2
  #   max_build_duration: 90
  #   integrations:
  #     app_store_connect: codemagic
  #   environment:
  #     flutter: stable
  #     xcode: latest
  #     cocoapods: default
  #     ios_signing:
  #       distribution_type: app_store
  #       bundle_identifier: com.itechevent.lesThemeApp
  #     vars:
  #       APP_STORE_APP_ID: 1234567890   # your numeric App Store app id
  #   scripts:
  #     - name: Set up code signing
  #       script: xcode-project use-profiles
  #     - name: Flutter packages get
  #       script: flutter pub get
  #     - name: Install CocoaPods dependencies
  #       script: find . -name "Podfile" -execdir pod install \;
  #     - name: Flutter build ipa
  #       script: |
  #         flutter build ipa --release \
  #           --export-options-plist=/Users/builder/export_options.plist
