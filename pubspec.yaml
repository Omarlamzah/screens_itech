name: les_theme_app
description: "Les Theme display & admin app"
publish_to: 'none'
version: 1.1.1+3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  webview_flutter: ^4.10.0
  webview_flutter_android: ^4.12.0
  shared_preferences: ^2.3.3
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  audioplayers: ^6.1.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  image_path_ios: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#080b10"
  adaptive_icon_foreground: "assets/images/logo.png"
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/images/
